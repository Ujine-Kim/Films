<!DOCTYPE html>
<html lang="en" data-lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>noúmenon — Filmmaker</title>
  <meta name="description" content="Films by noúmenon. Short films by Armenak." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['Cormorant Garamond', 'serif'],
            body: ['Montserrat', 'sans-serif'],
          },
          colors: {
            ink: '#080808',
            paper: '#f5f0e8',
            dust: '#9a9080',
          }
        }
      }
    }
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent: #e8c97a;
      --ink: #080808;
      --paper: #f5f0e8;
      --dust: #9a9080;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--ink);
      color: var(--paper);
      font-family: 'Montserrat', sans-serif;
      overflow-x: hidden;
      cursor: none;
    }

    /* Custom cursor */
    .cursor {
      position: fixed;
      width: 8px; height: 8px;
      background: var(--paper);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: transform 0.08s, width 0.2s, height 0.2s, background 0.2s;
      mix-blend-mode: difference;
    }
    .cursor-ring {
      position: fixed;
      width: 36px; height: 36px;
      border: 1px solid rgba(245,240,232,0.4);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9998;
      transform: translate(-50%, -50%);
      transition: transform 0.18s ease, width 0.3s, height 0.3s, border-color 0.2s;
    }
    .cursor-ring.hovering {
      width: 60px; height: 60px;
      border-color: rgba(232,201,122,0.7);
    }


    /* Nav */
    nav {
      position: fixed; top: 0; left: 0; right: 0;
      z-index: 100;
      padding: 28px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: linear-gradient(to bottom, rgba(8,8,8,0.9) 0%, transparent 100%);
    }

    .nav-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 42px;
      font-weight: 300;
      letter-spacing: 0.12em;
      color: var(--paper);
      text-decoration: none;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 1px;
      line-height: 1;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 32px;
    }

    .nav-link {
      font-family: 'Montserrat', sans-serif;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--dust);
      text-decoration: none;
      transition: color 0.3s;
    }
    .nav-link:hover { color: var(--paper); }

    /* Language toggle */
    .lang-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.15em;
    }
    .lang-btn {
      background: none;
      border: none;
      color: var(--dust);
      cursor: pointer;
      font-family: 'Montserrat', sans-serif;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.15em;
      transition: color 0.3s;
      padding: 0;
    }
    .lang-btn.active { color: var(--paper); }
    .lang-sep { color: var(--dust); opacity: 0.4; }

    /* Grain overlay */
    .grain {
      position: fixed;
      inset: 0;
      z-index: 2;
      opacity: 0.04;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-size: 256px 256px;
      pointer-events: none;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @media (max-width: 768px) {
      nav { padding: 20px 24px; }
    }

    /* ---- ACT BASE ---- */
    .act { min-height: 100vh; position: relative; overflow: hidden; }

    /* ---- ACT 1 ---- */
    .act--entry {
      background: #060606;
      display: flex; align-items: center; justify-content: center;
    }
    .act1-grain {
      position: absolute; inset: 0; pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.07'/%3E%3C/svg%3E");
      opacity: 0.8;
    }
    .act1-content { text-align: center; position: relative; z-index: 1; }
    .act1-tagline {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic; font-size: 18px;
      color: #4a4438; letter-spacing: 1px;
      margin-bottom: 32px; min-height: 28px;
    }
    .act1-logo { opacity: 0; transform: scale(0.97); transition: opacity 1.5s ease, transform 1.5s ease; }
    .act1-logo.visible { opacity: 1; transform: scale(1); }
    .logo-word {
      display: block;
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(36px, 6vw, 64px);
      color: var(--paper); letter-spacing: 6px; font-weight: 300;
    }
    .logo-sub {
      display: block; margin-top: 6px;
      font-family: 'Montserrat', sans-serif;
      font-size: 11px; letter-spacing: 5px;
      color: #4a4438; text-transform: uppercase;
      opacity: 0; transition: opacity 1.5s ease 0.3s;
    }
    .act1-logo.visible .logo-sub { opacity: 1; }
    .act1-scroll-hint {
      position: absolute; bottom: 32px; left: 50%; transform: translateX(-50%);
      font-size: 10px; letter-spacing: 3px; color: #3a3030; text-transform: uppercase;
      animation: pulse 2.5s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }
  </style>
</head>
<body>

  <div class="cursor" id="cursor"></div>
  <div class="cursor-ring" id="cursorRing"></div>

  <!-- Global grain overlay -->
  <div class="grain"></div>

  <!-- Fixed nav (hidden initially, revealed after Act 1) -->
  <nav id="main-nav" style="opacity:0;pointer-events:none;transition:opacity 0.8s ease;">
    <a href="/" class="nav-logo">
      <span>noúmenon</span>
      <span style="font-size:13px; font-family:'Montserrat',sans-serif; font-weight:400; letter-spacing:0.22em; text-transform:uppercase; color:var(--dust); margin-left:2px;">by Armenak</span>
    </a>
    <div class="nav-right">
      <a href="#films" class="nav-link" data-en="FILMS" data-ru="ФИЛЬМЫ">FILMS</a>
      <div class="lang-toggle">
        <button class="lang-btn active" id="btn-en" onclick="setLang('en')">EN</button>
        <span class="lang-sep">/</span>
        <button class="lang-btn" id="btn-ru" onclick="setLang('ru')">RU</button>
      </div>
    </div>
  </nav>

  <!-- Scroll container -->
  <main id="scroll-container">

    <!-- Act 1: Atmospheric Entry -->
    <section id="act1" class="act act--entry">
      <div class="act1-grain"></div>
      <div class="act1-content">
        <p class="act1-tagline" id="act1-tagline"></p>
        <div class="act1-logo">
          <span class="logo-word">noúmenon</span>
          <span class="logo-sub" data-en="by Armenak" data-ru="от Арменака">by Armenak</span>
        </div>
      </div>
      <div class="act1-scroll-hint" data-en="scroll to begin ↓" data-ru="прокрутите ↓">scroll to begin ↓</div>
    </section>

    <!-- Act 2: Director (placeholder) -->
    <section id="act2" class="act act--director"></section>

    <!-- Act 3: Film 0 (placeholder) -->
    <section id="act3" class="act act--film" data-film-index="0"></section>

    <!-- Act 4: Breath (placeholder) -->
    <section id="act4" class="act act--breath"></section>

    <!-- Act 5: Film 1 (placeholder) -->
    <section id="act5" class="act act--film" data-film-index="1"></section>

    <!-- Act 6: Close (placeholder) -->
    <section id="act6" class="act act--close"></section>

  </main>

  <script>
    // Film data (mirrors server)
    const films = [
      {
        slug: "the-lyrics",
        titleEn: "The Lyrics",
        titleRu: "Стих",
        year: 2025,
        duration: 11,
        genreEn: "Short Film",
        genreRu: "Короткий метр",
        taglineEn: "A soundrama about love and creativity.",
        taglineRu: "Саундрама о любви и творчестве.",
        poster: "url('/images/posters/the-lyrics.png') center/cover no-repeat",
        accentColor: "#c4b08a",
        awardEn: "",
        awardRu: "",
        filmUrl: "/film/the-lyrics",
        trailerUrl: "",
        buyPrice: 9.99
      },
      {
        slug: "the-drift",
        titleEn: "The Drift",
        titleRu: "Дрейф",
        year: 2026,
        duration: 44,
        genreEn: "Documentary",
        genreRu: "Документальный фильм",
        taglineEn: "A husband and wife travel to Iran to find their missing son.",
        taglineRu: "История мужа и жены, которые отправляются в Иран найти пропавшего сына.",
        poster: "url('/images/posters/the-drift.png') center/cover no-repeat",
        accentColor: "#c47a4a",
        awardEn: "",
        awardRu: "",
        filmUrl: "/film/the-drift",
        trailerUrl: "",
        videoPreview: "/video/drift-trailer.mp4",
        buyPrice: 9.99
      }
    ];

    // Language state
    let currentLang = localStorage.getItem('noumenon-lang') || localStorage.getItem('lang') || 'en';

    function setLang(lang) {
      currentLang = lang;
      localStorage.setItem('noumenon-lang', lang);
      localStorage.setItem('lang', lang);
      document.documentElement.setAttribute('data-lang', lang);
      document.getElementById('btn-en').classList.toggle('active', lang === 'en');
      document.getElementById('btn-ru').classList.toggle('active', lang === 'ru');

      // Update static text nodes
      document.querySelectorAll('[data-en]').forEach(el => {
        el.textContent = lang === 'ru' ? el.dataset.ru : el.dataset.en;
      });
    }

    // Custom cursor
    const cursor = document.getElementById('cursor');
    const ring   = document.getElementById('cursorRing');
    let mx = 0, my = 0, rx = 0, ry = 0;

    document.addEventListener('mousemove', e => {
      mx = e.clientX; my = e.clientY;
      cursor.style.left = mx + 'px';
      cursor.style.top  = my + 'px';
    });

    (function animateRing() {
      rx += (mx - rx) * 0.12;
      ry += (my - ry) * 0.12;
      ring.style.left = rx + 'px';
      ring.style.top  = ry + 'px';
      requestAnimationFrame(animateRing);
    })();

    document.addEventListener('mouseover', e => {
      if (e.target.closest('a, button')) ring.classList.add('hovering');
      else ring.classList.remove('hovering');
    });

    // ---- ACT 1: Typewriter + logo reveal ----
    const ACT1_TAGLINE = { en: '"Some stories refuse to be forgotten."', ru: '«Некоторые истории отказываются быть забытыми.»' };

    function runAct1() {
      const el = document.getElementById('act1-tagline');
      const logo = document.querySelector('.act1-logo');
      const lang = localStorage.getItem('noumenon-lang') || 'en';
      const text = ACT1_TAGLINE[lang];
      let i = 0;
      el.textContent = '';
      const interval = setInterval(() => {
        el.textContent += text[i];
        i++;
        if (i >= text.length) {
          clearInterval(interval);
          setTimeout(() => logo.classList.add('visible'), 1200);
        }
      }, 60);
    }

    window.addEventListener('load', () => setTimeout(runAct1, 300));

    // ---- NAV: hide during Act 1, reveal after ----
    const nav = document.getElementById('main-nav');
    const act1Section = document.getElementById('act1');
    const navObserver = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          nav.style.opacity = '0';
          nav.style.pointerEvents = 'none';
        } else {
          nav.style.opacity = '1';
          nav.style.pointerEvents = 'auto';
        }
      });
    }, { threshold: 0.8 });
    navObserver.observe(act1Section);

    // Init language
    setLang(currentLang);
  </script>
</body>
</html>
